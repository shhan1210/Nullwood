<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nullwood V44: Audio Rec & Watermark</title>
    <style>
        /* UI 스타일링 */
        body { margin: 0; overflow: hidden; background-color: #1b1c1c; font-family: 'Courier New', sans-serif; cursor: crosshair; }
        .panel { background: rgba(20, 20, 20, 0.75); backdrop-filter: blur(10px); padding: 15px; border-radius: 4px; color: #e2e5e7; user-select: none; box-shadow: 0 4px 30px rgba(0,0,0,0.8); border: 1px solid rgba(255, 255, 255, 0.08); transition: opacity 0.5s; }
        
        #info-panel { position: absolute; top: 30px; left: 30px; pointer-events: none; z-index: 10; }
        #logo-img { height: 28px; display: block; opacity: 0.9; margin-bottom: 5px; }
        h1#logo-text { margin: 0 0 2px 0; font-size: 14px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .brand { font-size: 10px; color: #888; margin-bottom: 8px; display: block; font-weight: 700; letter-spacing: 1px; }
        #info-panel p { margin: 0; font-size: 11px; opacity: 0.8; }
        
        #log-panel { position: absolute; top: 30px; right: 30px; width: 260px; max-height: 60vh; overflow-y: auto; padding: 10px 15px; z-index: 10; transition: all 0.5s ease; }
        #log-panel h2 { font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; margin-top: 0; opacity: 0.8; letter-spacing: 1px; }
        .log-item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 11px; cursor: pointer; transition: all 0.2s; color: #999; } 
        .log-item:hover { padding-left: 5px; color: #fff; background: rgba(255,255,255,0.05); }
        .log-name { font-weight: 700; display: block; margin-bottom: 3px; font-size: 13px; color: #fff; }
        
        #popup { display: none; position: fixed; background: rgba(15, 15, 15, 0.95); padding: 15px; z-index: 100; color: #ccc; font-size: 11px; line-height: 1.8; box-shadow: 0 10px 40px rgba(0,0,0,1); pointer-events: none; width: 200px; border: 1px solid #444; }
        .pop-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .pop-label { color: #666; font-weight: 600; }
        
        #controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; padding: 10px 30px; border-radius: 50px; background: rgba(15, 15, 15, 0.85); border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: opacity 0.5s; z-index: 20; flex-wrap: nowrap; }
        
        input[type=range] { -webkit-appearance: none; width: 100px; height: 3px; background: linear-gradient(to right, #333, #ccc); outline: none; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px #fff; border: 2px solid #000; }
        
        .btn { background: transparent; border: 1px solid #444; color: #888; font-size: 9px; font-weight: 700; cursor: pointer; padding: 6px 10px; letter-spacing: 1px; border-radius: 20px; transition: all 0.3s; white-space: nowrap; }
        .btn.active { color: #000; background: #fff; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .btn.recording { color: #fff; background: #e74c3c; border-color: #e74c3c; animation: pulseRed 1s infinite; width: 60px; text-align: center; }
        
        .divider { width: 1px; height: 16px; background: #444; display: block; }
        
        #ui-toggle-btn { position: absolute; bottom: 40px; left: 40px; background: rgba(15, 15, 15, 0.85); border: 1px solid #444; color: #888; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 9999; }
        #ui-toggle-btn:hover { color: #fff; border-color: #fff; }
        #ui-toggle-btn svg { width: 18px; height: 18px; fill: currentColor; }
        
        #countdown-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        #count-num { font-size: 120px; font-weight: 900; text-shadow: 0 0 30px rgba(255,255,255,0.8); line-height: 1; margin-bottom: 20px;}
        #count-text { font-size: 16px; letter-spacing: 2px; font-weight: 400; opacity: 0.8; text-transform: uppercase; }
        
        ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #444; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 rgba(231, 76, 60, 0.4); } 50% { box-shadow: 0 0 15px rgba(231, 76, 60, 0.8); } 100% { box-shadow: 0 0 0 rgba(231, 76, 60, 0.4); } }

        @media (max-width: 768px) {
            #info-panel { top: 20px; left: 20px; width: auto; max-width: 200px; padding: 10px; }
            #logo-text { font-size: 12px; }
            #log-panel { top: auto; bottom: 110px; right: 50%; left: auto; transform: translateX(50%); width: 85%; max-width: none; max-height: 150px; padding: 10px; }
            #log-panel h2 { text-align: center; }
            #controls { width: 90%; bottom: 20px; padding: 10px 15px; flex-wrap: wrap; justify-content: center; gap: 8px; border-radius: 15px; }
            .divider { display: none; } 
            input[type=range] { width: 100%; order: -1; margin-bottom: 5px; }
            #ui-toggle-btn { bottom: 20px; left: 10px; width: 32px; height: 32px; opacity: 0.5; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
</head>
<body>
    <div id="countdown-overlay"><div id="count-num">3</div><div id="count-text">Starting 10s recording...</div></div>
    <button id="ui-toggle-btn" title="Toggle UI">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
    </button>
    <div id="info-panel" class="panel">
        <div id="logo-container">
            <img id="logo-img" src="Nullwood_Logo.png" alt="NULLWOOD" onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block';">
            <h1 id="logo-text" style="display:none;">NULLWOOD</h1>
        </div>
        <span class="brand">Created by SHHAN</span>
        <p>Location: Black Lake No.01</p><p>System: Final Active</p>
    </div>
    <div id="log-panel" class="panel">
        <h2>STARFALL REGISTRY</h2>
        <div id="log-list"></div>
    </div>
    <div id="popup"><div class="pop-row" style="border:none; margin-bottom:5px;"><span id="p-name" style="font-weight:900; font-size:13px; color:#fff;">-</span></div><div class="pop-row"><span class="pop-label">Origin</span> <span id="p-loc">-</span></div><div class="pop-row"><span class="pop-label">Born</span> <span id="p-born">-</span></div><div class="pop-row"><span class="pop-label">Died</span> <span id="p-died">-</span></div><div class="pop-row"><span class="pop-label">Cause</span> <span id="p-cause">-</span></div></div>
    
    <div id="controls">
        <span style="font-size:9px; font-weight:700; color:#666;">LIGHT</span>
        <input type="range" id="mood-slider" min="0" max="100" value="0">
        <div class="divider"></div>
        <button id="btn-rain" class="btn active">RAIN</button>
        <button id="btn-fog" class="btn active">FOG</button>
        <button id="btn-sound" class="btn">NOISE</button> 
        <button id="btn-turn" class="btn active">TURN</button> 
        <div class="divider"></div>
        <button id="btn-img" class="btn">IMG</button>
        <button id="btn-rec" class="btn">REC</button>
    </div>

    <script>
        const C_BLACK = 0x1b1c1c; const C_WHITE = 0xe2e5e7; const usedNames = new Set(); 
        function createParticleTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 64; canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,0.9)'); gradient.addColorStop(0.3, 'rgba(200,200,200,0.3)'); gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient; context.fillRect(0, 0, 64, 64);
            const texture = new THREE.Texture(canvas); texture.needsUpdate = true; return texture;
        }
        const particleTexture = createParticleTexture();

        // [추가됨] 바닥 노이즈 텍스처 생성기
        function createNoiseTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, size, size);
            for (let i = 0; i < 80000; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const gray = Math.random() * 40 + 10; 
                ctx.fillStyle = `rgba(${gray}, ${gray}, ${gray}, 0.15)`;
                ctx.fillRect(x, y, 2, 2);
            }
            const tex = new THREE.Texture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(40, 40);
            tex.needsUpdate = true;
            return tex;
        }
        const groundNoiseTexture = createNoiseTexture();

        // [오디오 시스템 수정] 녹음용 Destination 추가
        const AudioContext = window.AudioContext || window.webkitAudioContext; 
        let audioCtx, masterGain, audioDest; // audioDest 변수 추가

        function initAudio() {
            if (audioCtx) return; 
            audioCtx = new AudioContext(); 
            masterGain = audioCtx.createGain(); 
            masterGain.gain.value = 0.4; 
            masterGain.connect(audioCtx.destination);
            
            // [핵심] 녹음을 위한 오디오 스트림 생성 및 연결
            audioDest = audioCtx.createMediaStreamDestination();
            masterGain.connect(audioDest);

            const bufferSize = 2 * audioCtx.sampleRate; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            const rainNode = audioCtx.createBufferSource(); rainNode.buffer = buffer; rainNode.loop = true;
            const rainFilter = audioCtx.createBiquadFilter(); rainFilter.type = 'lowpass'; rainFilter.frequency.value = 300;
            rainNode.connect(rainFilter); rainFilter.connect(masterGain); rainNode.start();
            const droneOsc = audioCtx.createOscillator(); droneOsc.type = 'sine'; droneOsc.frequency.value = 35; 
            const droneGain = audioCtx.createGain(); droneGain.gain.value = 0.2; droneOsc.connect(droneGain); droneGain.connect(masterGain); droneOsc.start();
        }

        const locData = [{ id: 'JP', names: ["田中 健", "佐藤 美咲", "鈴木 一郎", "高橋 蓮", "渡辺 結衣", "伊藤 葵", "中村 翼", "山本 颯太", "加藤 陸", "小林 陽菜"], weight: 3 }, { id: 'KR', names: ["이수현", "박지훈", "정민재", "김서연", "최도현", "강준호", "송지아", "류민석", "백하나", "윤서준"], weight: 3 }, { id: 'TW', names: ["陳 建宏", "林 志豪", "黃 淑芬", "張 雅婷", "李 冠宇", "王 怡君", "吳 俊宏"], weight: 2 }, { id: 'TH', names: ["Somchai", "Arthit", "Kanya", "Nawat", "Araya", "Malee", "Somsak"], weight: 2 }, { id: 'US', names: ["Sarah", "James", "Emily", "Michael", "David", "Robert", "Jennifer", "William", "Elizabeth"], weight: 3 }, { id: 'FR', names: ["Camille", "Lucas", "Léa", "Gabriel", "Chloé", "Louis", "Manon"], weight: 1 }, { id: 'CN', names: ["王伟", "李娜", "张敏", "刘洋", "陈静", "杨强", "赵丽"], weight: 1 }];
        const weightedLocs = []; locData.forEach(l => { for(let i=0; i<l.weight; i++) weightedLocs.push(l); });
        const causes = ["System Collapse", "Void Assimilation", "Memory Fragmentation", "Signal Lost", "Data Corruption"];
        function generateSoul() {
            let name, uniqueName; let attempts = 0; const loc = weightedLocs[Math.floor(Math.random()*weightedLocs.length)];
            do { name = loc.names[Math.floor(Math.random()*loc.names.length)]; uniqueName = name; attempts++; } while (usedNames.has(uniqueName) && attempts < 50);
            usedNames.add(uniqueName); if(usedNames.size > 30) { const it = usedNames.values(); usedNames.delete(it.next().value); }
            const year = 1950 + Math.floor(Math.random()*150);
            return { name: uniqueName, loc: loc.id, born: `${year-Math.floor(15+Math.random()*70)}.01.01`, died: `${year}.12.31`, cause: causes[Math.floor(Math.random()*causes.length)] };
        }

        const scene = new THREE.Scene(); scene.background = new THREE.Color(C_BLACK); scene.fog = new THREE.FogExp2(C_BLACK, 0.002); 
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 4000);
        camera.position.set(50, 50, 420); 
        
        // [중요] 렌더러 설정 - alpha: true는 로고 합성 시 투명도 문제를 해결해줍니다.
        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, alpha: true }); 
        renderer.setSize(window.innerWidth, window.innerHeight); 
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        renderer.autoClear = false; // 수동 렌더링을 위해 autoClear 끔
        document.body.appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement); 

// [추가] 카메라 렌즈에 필름 노이즈(Grain) 입히기
        scene.add(camera); // 카메라를 씬에 추가해야 자식(노이즈)이 보임

        // 렌즈 앞을 덮을 투명한 판 생성
        const grainGeo = new THREE.PlaneGeometry(100, 100); 
        const grainMat = new THREE.MeshBasicMaterial({
            map: groundNoiseTexture, // 아까 만든 바닥용 노이즈 재활용
            transparent: true,
            opacity: 0.05,       // 노이즈 강도 (0.03 ~ 0.08 사이 추천)
            blending: THREE.AdditiveBlending, // 밝게 합성
            depthTest: false,    // 다른 물체에 가려지지 않게
            depthWrite: false
        });
        
        const grainMesh = new THREE.Mesh(grainGeo, grainMat);
        grainMesh.position.z = -20; // 카메라 20만큼 앞쪽에 고정
        camera.add(grainMesh); // 카메라가 움직일 때 같이 따라다님

        controls.enableDamping = true; controls.maxPolarAngle = Math.PI/2 - 0.02; controls.minDistance = 50; controls.maxDistance = 1500; controls.target.set(0, 58, 0);
        controls.autoRotate = true; controls.autoRotateSpeed = 0.03; 

        // [UI 씬 설정] - 로고가 화면과 영상에 모두 박히도록 함
        const sceneUI = new THREE.Scene();
        const cameraUI = new THREE.OrthographicCamera(-window.innerWidth/2, window.innerWidth/2, window.innerHeight/2, -window.innerHeight/2, 1, 10);
        cameraUI.position.z = 10;
        const wmTexture = new THREE.TextureLoader().load('Nullwood_Logo.png'); 
        const wmMat = new THREE.SpriteMaterial({ map: wmTexture, transparent: true, opacity: 0.5 }); 
        const wmSprite = new THREE.Sprite(wmMat);
        const wmScale = 0.4; wmSprite.scale.set(300 * wmScale, 56 * wmScale, 1); 
        function updateLogoPosition() { const marginX = 80; const marginY = 40; wmSprite.position.set((window.innerWidth/2) - marginX, -(window.innerHeight/2) + marginY, 1); }
        updateLogoPosition(); sceneUI.add(wmSprite);

        const spotLight = new THREE.SpotLight(C_WHITE, 1.0); spotLight.position.set(500, 600, 200); spotLight.target.position.set(0, 0, 0); spotLight.angle = Math.PI / 6; spotLight.penumbra = 0.5; spotLight.castShadow = true; spotLight.shadow.mapSize.set(4096, 4096); spotLight.shadow.bias = -0.00005; scene.add(spotLight); scene.add(spotLight.target);
        const beamGeo = new THREE.ConeGeometry(80, 1200, 64, 1, true); beamGeo.translate(0, -600, 0); const beamMat = new THREE.MeshBasicMaterial({ color: C_WHITE, transparent: true, opacity: 0.0, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false });
        const lightBeam = new THREE.Mesh(beamGeo, beamMat); lightBeam.position.copy(spotLight.position); lightBeam.lookAt(spotLight.target.position); lightBeam.rotateX(Math.PI / 2); scene.add(lightBeam);
        const ambLight = new THREE.AmbientLight(C_WHITE, 0.05); scene.add(ambLight);

        function updateMood(val) { const t = val / 100; spotLight.intensity = 0.5 + (t * 5.0); lightBeam.material.opacity = 0.02 + (t * 0.05); ambLight.intensity = 0.05 + (t * 0.2); scene.fog.density = 0.0025 - (t * 0.001); }
        document.getElementById('mood-slider').addEventListener('input', (e) => updateMood(e.target.value)); updateMood(0); 

        const groundGeo = new THREE.BoxGeometry(6000, 200, 6000, 256, 1, 256); 
        const v = groundGeo.attributes.position.array; 
        for (let i = 0; i < v.length; i += 3) { const y = v[i+1]; if (y > 0) { const x = v[i]; const z = v[i+2]; const dist = Math.sqrt(x*x + z*z); const noise = Math.sin(x*0.003)*Math.cos(z*0.003)*25 + Math.sin(x*0.01 + z*0.01)*5; v[i+1] = (dist < 120 ? 0 : noise) + 10; } }
        groundGeo.computeVertexNormals(); // [수정됨] 노이즈 텍스처가 적용된 바닥 재질
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: C_BLACK, 
            roughness: 0.8, 
            metalness: 0.1,
            map: groundNoiseTexture, 
            dithering: true 
        });const ground = new THREE.Mesh(groundGeo, groundMat); ground.position.y = -20; ground.receiveShadow = true; scene.add(ground);

        const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9, metalness: 0.1 });
        function createFrame(y, h) { const g = new THREE.Group(); const w = 6; const s = 70; const b1 = new THREE.Mesh(new THREE.BoxGeometry(s, h, w), frameMat); b1.position.z = -s/2; const b2 = new THREE.Mesh(new THREE.BoxGeometry(s, h, w), frameMat); b2.position.z = s/2; const b3 = new THREE.Mesh(new THREE.BoxGeometry(w, h, s-w), frameMat); b3.position.x = -s/2; const b4 = new THREE.Mesh(new THREE.BoxGeometry(w, h, s-w), frameMat); b4.position.x = s/2; g.add(b1, b2, b3, b4); g.position.y = y; g.castShadow = true; g.receiveShadow = true; return g; }
        scene.add(createFrame(160, 16)); scene.add(createFrame(-8, 16));   

        const water = new THREE.Mesh(new THREE.PlaneGeometry(66, 66), new THREE.MeshStandardMaterial({ color: C_BLACK, roughness: 0.5, metalness: 0.9 })); water.rotation.x = -Math.PI/2; water.position.y = 1; water.receiveShadow = true; scene.add(water);

        const treeHeight = 2000; const treeGeo = new THREE.CylinderGeometry(0.8, 1.2, treeHeight, 8); const colors = []; const positions = treeGeo.attributes.position.array; const colorTop = new THREE.Color(0x333333); const colorBottom = new THREE.Color(C_BLACK); 
        for (let i = 0; i < positions.length; i += 3) { const y = positions[i + 1]; const t = (y + treeHeight / 2) / treeHeight; const finalColor = colorBottom.clone().lerp(colorTop, Math.min(1, Math.pow(t, 2))); colors.push(finalColor.r, finalColor.g, finalColor.b); } 
        treeGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3)); treeGeo.translate(0, treeHeight / 2 - 50, 0);
        const treeMat = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.9, metalness: 0.1, flatShading: true, dithering: true }); 
        treeMat.onBeforeCompile = (shader) => { shader.uniforms.time = { value: 0 }; shader.vertexShader = `uniform float time;\n` + shader.vertexShader; shader.vertexShader = shader.vertexShader.replace('#include <begin_vertex>', `#include <begin_vertex>\nfloat wind = transformed.y * 0.002; float noise = sin(time * 0.5 + position.x * 0.01) + cos(time * 0.7 + position.z * 0.01); transformed.x += sin(time * 0.8 + position.z * 0.02 + noise) * wind; transformed.z += cos(time * 0.6 + position.x * 0.02 + noise) * wind;`); treeMat.userData.shader = shader; };
        const treeCount = 1500; const treeMesh = new THREE.InstancedMesh(treeGeo, treeMat, treeCount); const dummy = new THREE.Object3D(); 
        for(let i=0; i<treeCount; i++){ const r = 100 + Math.random() * 2000; const th = Math.random() * Math.PI * 2; dummy.position.set(Math.cos(th)*r, -20, Math.sin(th)*r); dummy.rotation.set((Math.random() - 0.5) * 0.1, Math.random() * Math.PI, (Math.random() - 0.5) * 0.1); const scale = 0.8 + Math.random() * 0.4; dummy.scale.set(scale, 1, scale); dummy.updateMatrix(); treeMesh.setMatrixAt(i, dummy.matrix); } treeMesh.castShadow = true; treeMesh.receiveShadow = true; scene.add(treeMesh);

        const rainCount = 12000; const rainGeo = new THREE.BufferGeometry(); const rainPos = new Float32Array(rainCount * 3); for(let i=0; i<rainCount*3; i++) rainPos[i] = (Math.random()-0.5)*3000;
        rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
        const rainMat = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 1.2, transparent:true, opacity:0.3 }); const rainSystem = new THREE.Points(rainGeo, rainMat); scene.add(rainSystem);

        const bgStarGeo = new THREE.BufferGeometry(); const bgStarPos = new Float32Array(3000 * 3);
        for(let i=0; i<3000; i++) { bgStarPos[i*3] = (Math.random()-0.5) * 4000; bgStarPos[i*3+1] = 300 + Math.random() * 1500; bgStarPos[i*3+2] = (Math.random()-0.5) * 4000; }
        bgStarGeo.setAttribute('position', new THREE.BufferAttribute(bgStarPos, 3));
        const bgStarMat = new THREE.PointsMaterial({ color: C_WHITE, size: 1.5, transparent: true, opacity: 0.6, fog: false });
        const bgStars = new THREE.Points(bgStarGeo, bgStarMat); scene.add(bgStars);

        const baseFogCount = 3000; const baseFogGeo = new THREE.BufferGeometry(); const baseFogPos = new Float32Array(baseFogCount * 3);
        for(let i=0; i<baseFogCount; i++) { baseFogPos[i*3] = (Math.random()-0.5) * 3500; baseFogPos[i*3+1] = Math.random() * 40; baseFogPos[i*3+2] = (Math.random()-0.5) * 3500; }
        baseFogGeo.setAttribute('position', new THREE.BufferAttribute(baseFogPos, 3));
        const baseFogMat = new THREE.PointsMaterial({ size: 450, color: 0xeeeeee, map: particleTexture, transparent: true, opacity: 0.12, depthWrite: false, blending: THREE.AdditiveBlending });
        const groundBaseFog = new THREE.Points(baseFogGeo, baseFogMat); scene.add(groundBaseFog);

        const fogCount = 2500; const fogGeo = new THREE.BufferGeometry();
        const fogPositions = new Float32Array(fogCount * 3); const fogVelocities = []; 
        for(let i=0; i<fogCount; i++) { const x = (Math.random()-0.5) * 3000; const y = Math.random() * 150; const z = (Math.random()-0.5) * 3000; fogPositions[i*3] = x; fogPositions[i*3+1] = y; fogPositions[i*3+2] = z; fogVelocities.push({x:0, y:0, z:0}); }
        fogGeo.setAttribute('position', new THREE.BufferAttribute(fogPositions, 3));
        const fogMat = new THREE.PointsMaterial({ size: 350, color: 0x777777, map: particleTexture, transparent: true, opacity: 0.1, depthWrite: false, blending: THREE.AdditiveBlending });
        const fluidFog = new THREE.Points(fogGeo, fogMat); scene.add(fluidFog);

        const starGeo = new THREE.SphereGeometry(1.5, 16, 16); const starMat = new THREE.MeshBasicMaterial({ color: C_WHITE }); const trailMat = new THREE.PointsMaterial({ size: 4, color: C_WHITE, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const stars = []; const trailParticles = [];
        let nextStarSpawnTime = 0; function spawnStar(currentTime) { if (currentTime < nextStarSpawnTime) return; const s = new THREE.Mesh(starGeo, starMat.clone()); const targetX = (Math.random() - 0.5) * 60; const targetZ = (Math.random() - 0.5) * 60; s.position.set(targetX, 600, targetZ); s.userData = { vel: -0.25, data: generateSoul(), twinkleOffset: Math.random() * 10 }; const light = new THREE.PointLight(C_WHITE, 2, 200); s.add(light); scene.add(s); stars.push(s); nextStarSpawnTime = currentTime + 8.0 + Math.random() * 10.0; }
        function spawnTrail(pos) { const count = 5; for(let i=0; i<count; i++) { const geo = new THREE.BufferGeometry(); const ox = (Math.random() - 0.5) * 6.0; const oz = (Math.random() - 0.5) * 6.0; const oy = (Math.random()) * 5.0; geo.setAttribute('position', new THREE.Float32BufferAttribute([pos.x + ox, pos.y + oy, pos.z + oz], 3)); const p = new THREE.Points(geo, trailMat); p.userData = { life: 1.0, decay: 0.03 + Math.random() * 0.02 }; scene.add(p); trailParticles.push(p); } }

        let mouseX = 0, lastMouseX = 0, mouseVelX = 0; let fogRotationVelocity = 0; document.addEventListener('mousemove', (e) => { mouseX = (e.clientX / window.innerWidth) * 2 - 1; mouseVelX = mouseX - lastMouseX; lastMouseX = mouseX; });
        const popup = document.getElementById('popup'); function addLog(data) { const list = document.getElementById('log-list'); const el = document.createElement('div'); el.className = 'log-item'; el.innerHTML = `<span class="log-name">${data.name}</span>${data.loc} | ${data.died}`; el.onmouseenter = () => { document.getElementById('p-name').innerText = data.name; document.getElementById('p-loc').innerText = data.loc; document.getElementById('p-born').innerText = data.born; document.getElementById('p-died').innerText = data.died; document.getElementById('p-cause').innerText = data.cause; const r = el.getBoundingClientRect(); popup.style.display = 'block'; popup.style.top = r.top + 'px'; popup.style.left = (r.left - 210) + 'px'; }; el.onmouseleave = () => popup.style.display = 'none'; list.insertBefore(el, list.firstChild); if (list.children.length > 25) list.removeChild(list.lastChild); }
        document.getElementById('btn-rain').onclick = (e) => { const sys = rainSystem; sys.visible = !sys.visible; e.target.classList.toggle('active'); }; document.getElementById('btn-fog').onclick = (e) => { fluidFog.visible = !fluidFog.visible; groundBaseFog.visible = !groundBaseFog.visible; e.target.classList.toggle('active'); }; 
        document.getElementById('btn-sound').onclick = (e) => { const btn = e.target; const isActive = !btn.classList.contains('active'); if (isActive) { if (!audioCtx) initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume(); btn.classList.add('active'); } else { if (audioCtx) audioCtx.suspend(); btn.classList.remove('active'); } };
        document.getElementById('btn-turn').onclick = (e) => { controls.autoRotate = !controls.autoRotate; e.target.classList.toggle('active'); };
        const uiToggleBtn = document.getElementById('ui-toggle-btn'); const uiElements = [document.getElementById('info-panel'), document.getElementById('log-panel'), document.getElementById('controls')]; let isUiVisible = true;
        uiToggleBtn.onclick = () => { isUiVisible = !isUiVisible; uiElements.forEach(el => el.style.opacity = isUiVisible ? '1' : '0'); uiToggleBtn.innerHTML = isUiVisible ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-4 .7l2.16 2.16C10.86 7.13 11.41 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78 3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>'; };
        document.getElementById('btn-img').onclick = () => { const link = document.createElement('a'); link.download = 'nullwood_capture.png'; link.href = renderer.domElement.toDataURL('image/png'); link.click(); };

        let mediaRecorder; let recordedChunks = []; const btnRec = document.getElementById('btn-rec'); const countdownOverlay = document.getElementById('countdown-overlay'); const countNum = document.getElementById('count-num');
        document.getElementById('btn-rec').onclick = () => { if (btnRec.classList.contains('recording')) return; countdownOverlay.style.display = 'flex'; let count = 3; countNum.innerText = count; const timer = setInterval(() => { count--; if(count > 0) { countNum.innerText = count; } else { clearInterval(timer); countdownOverlay.style.display = 'none'; startRecording(); } }, 1000); };
        
      function startRecording() { 
            btnRec.classList.add('recording'); 
            let recordTime = 10; 
            btnRec.innerText = `REC ${recordTime}`; 
            recordedChunks = []; 

            // [1] 4K 해상도 강제 설정 (3840 x 2160)
            const width4K = 3840;
            const height4K = 2160;
            
            // 렌더러와 카메라를 4K 비율로 변경 (false: CSS 크기는 건드리지 않음)
            renderer.setSize(width4K, height4K, false); 
            camera.aspect = width4K / height4K;
            camera.updateProjectionMatrix();

            // UI 카메라(로고용)도 4K 좌표계로 변경
            cameraUI.left = -width4K / 2;
            cameraUI.right = width4K / 2;
            cameraUI.top = height4K / 2;
            cameraUI.bottom = -height4K / 2;
            cameraUI.updateProjectionMatrix();
            
            // 로고 위치 4K 기준으로 재배치 (우측 하단)
            wmSprite.position.set((width4K/2) - 80, -(height4K/2) + 40, 1);

            // [2] 고해상도 스트림 생성
            const canvasStream = renderer.domElement.captureStream(30); 
            const combinedStream = new MediaStream([...canvasStream.getVideoTracks()]);

            // 오디오 트랙 추가
            if (audioCtx && audioDest) {
                const audioStream = audioDest.stream;
                const audioTracks = audioStream.getAudioTracks();
                if (audioTracks.length > 0) {
                    combinedStream.addTrack(audioTracks[0]);
                }
            }

            // [3] 비트레이트 80Mbps 설정 (초고화질)
            const options = { 
                mimeType: 'video/webm; codecs=vp9,opus',
                videoBitsPerSecond: 80000000 
            }; 

            try { mediaRecorder = new MediaRecorder(combinedStream, options); } 
            catch (e) { try { mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' }); } catch (e2) { alert("Recording not supported."); return; } } 
            
            mediaRecorder.ondataavailable = (event) => { if (event.data.size > 0) recordedChunks.push(event.data); }; 
            
            mediaRecorder.onstop = () => { 
                const blob = new Blob(recordedChunks, { type: 'video/webm' }); 
                const url = URL.createObjectURL(blob); 
                const link = document.createElement('a'); 
                link.href = url; 
                link.download = 'nullwood_world_no01.webm'; 
                link.click(); 
                
                btnRec.classList.remove('recording'); 
                btnRec.innerText = 'REC'; 

                // [4] 녹화가 끝나면 원래 화면 크기로 복구
                window.onresize(); 
            }; 
            
            mediaRecorder.start(); 
            const recTimer = setInterval(() => { 
                recordTime--; 
                if(recordTime > 0) btnRec.innerText = `REC ${recordTime}`; 
                else clearInterval(recTimer); 
            }, 1000); 
            
            setTimeout(() => { mediaRecorder.stop(); }, 10000); 
        }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate); 
            controls.update(); 
            const time = clock.getElapsedTime();
            if (treeMat.userData.shader) treeMat.userData.shader.uniforms.time.value = time;
            if(rainSystem.visible) { const pos = rainGeo.attributes.position.array; for(let i=1; i<pos.length; i+=3) { pos[i] -= 5; if(pos[i] < 0) pos[i] = 1000 + Math.random() * 200; } rainGeo.attributes.position.needsUpdate = true; }
            if(groundBaseFog.visible) { fogRotationVelocity += mouseVelX * 0.003; fogRotationVelocity *= 0.9; groundBaseFog.rotation.y += 0.0002 + fogRotationVelocity; fluidFog.rotation.y += 0.0003 + fogRotationVelocity; mouseVelX = 0; }
            spawnStar(time); 
            for(let i=stars.length-1; i>=0; i--){ const s = stars[i]; s.position.y += s.userData.vel; const scale = 1.0 + Math.sin(time * 15 + s.userData.twinkleOffset) * 0.2; s.scale.setScalar(scale); spawnTrail(s.position); if(s.position.y < -4) { addLog(s.userData.data); scene.remove(s); stars.splice(i, 1); } }
            for(let i=trailParticles.length-1; i>=0; i--){ const p = trailParticles[i]; p.userData.life -= p.userData.decay; if(p.userData.life <= 0) { scene.remove(p); trailParticles.splice(i, 1); } else { p.material.opacity = p.userData.life * 0.5; } }
            
            // [렌더링 루프] 
            renderer.clear();
            renderer.render(scene, camera);
            renderer.clearDepth(); 
            renderer.render(sceneUI, cameraUI);
        }

        window.onresize = () => { 
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); 
            cameraUI.left = -window.innerWidth / 2; cameraUI.right = window.innerWidth / 2; cameraUI.top = window.innerHeight / 2; cameraUI.bottom = -window.innerHeight / 2; cameraUI.updateProjectionMatrix();
            updateLogoPosition();
        };
        animate();
    </script>
